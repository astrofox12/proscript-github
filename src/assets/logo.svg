<svg width="300" height="80" viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&amp;display=swap');
    </style>
    <linearGradient id="scriptGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00e599;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d99f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Pro -->
  <text x="8" y="45" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#9ca3af" opacity="0.6">Pro</text>
  
  <!-- Script (with glow) -->
  <text x="70" y="45" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="url(#scriptGradient)" filter="url(#glow)">Script</text>
  
  <!-- Academy -->
  <text x="14" y="67" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#9ca3af" opacity="0.5" letter-spacing="2">ACADEMY</text>
</svg>
